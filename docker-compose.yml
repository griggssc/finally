services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - finally-data:/app/db
    env_file:
      - .env
    restart: unless-stopped

  playwright:
    image: mcr.microsoft.com/playwright:v1.40.0-jammy
    profiles:
      - test
    working_dir: /test
    volumes:
      - ./test:/test
    environment:
      - BASE_URL=http://app:8000
    command: npx playwright test
    depends_on:
      - app

volumes:
  finally-data:
